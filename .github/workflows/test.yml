name: spec-lesson tests

on:
  push:
    paths:
      - 'spec_lesson/**'
      - 'tests/**'
      - 'pyproject.toml'
  pull_request:
    paths:
      - 'spec_lesson/**'
      - 'tests/**'
      - 'pyproject.toml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: pytest -q
